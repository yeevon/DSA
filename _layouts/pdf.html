<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} — {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body class="pdf-body">
  {% include nav.html %}
  <div class="pdf-header">
    <h1>{{ page.title }}</h1>
    <a class="pdf-open" href="{{ page.pdf_url | relative_url }}" target="_blank" rel="noopener">Open in new tab ↗</a>
  </div>
  <iframe class="pdf-viewer" src="{{ page.pdf_url | relative_url }}" title="{{ page.title }}"></iframe>
</body>
</html>
