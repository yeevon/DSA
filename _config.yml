title: CS 300
description: Lectures, notes, and practice prompts for Data Structures & Algorithms
baseurl: /DSA
url: https://yeevon.github.io

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

permalink: pretty

exclude:
  - README.md
  - notes-style.tex
  - "*.tex"
  - "**/*.tex"
  - "**/*.aux"
  - "**/*.log"
  - "**/*.out"
  - "**/*.fls"
  - "**/*.fdb_latexmk"
  - "**/*.synctex.gz"
  - Gemfile
  - Gemfile.lock
  - vendor
  - .github
